name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --omit=optional
      - run: npm test
      - run: npm run build
      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
